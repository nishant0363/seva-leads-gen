<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Region — Field Ops Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --border:    rgba(255,255,255,0.07);
      --accent:    #f0c040;
      --accent2:   #3b82f6;
      --text:      #e8eaf0;
      --muted:     #7a7f8e;
      --card-bg:   #181c27;
      --card-hover:#1e2334;
      --radius:    16px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(59,130,246,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(240,192,64,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 55% 40%, rgba(99,102,241,0.06) 0%, transparent 50%);
      animation: meshShift 14s ease-in-out infinite alternate;
    }

    @keyframes meshShift {
      0%   { opacity: 1; transform: scale(1) translateX(0); }
      100% { opacity: 0.85; transform: scale(1.06) translateX(-16px); }
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      pointer-events: none;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 0;
    }

    .header {
      text-align: center;
      margin-bottom: 44px;
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, #e0a020 100%);
      font-size: 26px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(240,192,64,0.3);
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(26px, 4vw, 38px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
    }

    .header h1 span { color: var(--accent); }

    .header p {
      margin-top: 10px;
      font-size: 15px;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Region grid ── */
    .region-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
      width: 100%;
      max-width: 920px;
      animation: fadeUp 0.7s 0.12s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Region card ── */
    .region-card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px 20px;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.22,1,0.36,1),
                  border-color 0.18s,
                  box-shadow 0.22s,
                  background 0.18s;
      overflow: hidden;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      outline: none;
    }

    .region-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--card-accent, #3b82f6) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.22s;
      border-radius: var(--radius);
    }

    .region-card:hover,
    .region-card:focus-visible {
      transform: translateY(-4px) scale(1.012);
      border-color: var(--card-accent, var(--accent2));
      background: var(--card-hover);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45), 0 0 0 1px var(--card-accent, var(--accent2));
    }

    .region-card:hover::before,
    .region-card:focus-visible::before { opacity: 0.06; }

    .region-card:active { transform: translateY(-1px) scale(1.005); }

    .card-icon {
      font-size: 28px;
      line-height: 1;
      position: relative; z-index: 1;
    }

    .card-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      position: relative; z-index: 1;
      text-transform: capitalize;
    }

    .card-meta {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
      position: relative; z-index: 1;
      line-height: 1.5;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: auto;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: rgba(255,255,255,0.06);
      color: var(--card-accent, var(--accent2));
      border: 1px solid rgba(255,255,255,0.08);
      position: relative; z-index: 1;
      width: fit-content;
    }

    /* ── All regions card ── */
    .region-card.all-card {
      --card-accent: #f0c040;
      grid-column: 1 / -1;
      flex-direction: row;
      align-items: center;
      padding: 18px 24px;
      gap: 16px;
    }

    .all-card .card-info { flex: 1; }
    .all-card .card-name { font-size: 16px; }

    /* ── Loading overlay ── */
    #loadingOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(13,15,20,0.92);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      backdrop-filter: blur(6px);
    }

    #loadingOverlay.active { display: flex; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(240,192,64,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .footer-note {
      margin-top: 32px;
      font-size: 12px;
      color: var(--muted);
      opacity: 0.6;
      text-align: center;
      animation: fadeUp 0.7s 0.22s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* stagger */
    .region-card { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }
    .region-card:nth-child(1)  { animation-delay: 0.06s; }
    .region-card:nth-child(2)  { animation-delay: 0.10s; }
    .region-card:nth-child(3)  { animation-delay: 0.14s; }
    .region-card:nth-child(4)  { animation-delay: 0.18s; }
    .region-card:nth-child(5)  { animation-delay: 0.22s; }
    .region-card:nth-child(6)  { animation-delay: 0.26s; }
    .region-card:nth-child(7)  { animation-delay: 0.30s; }
    .region-card:nth-child(8)  { animation-delay: 0.34s; }
    .region-card:nth-child(9)  { animation-delay: 0.38s; }
    .region-card:nth-child(10) { animation-delay: 0.42s; }
    .region-card:nth-child(11) { animation-delay: 0.46s; }
    .region-card:nth-child(12) { animation-delay: 0.50s; }

    @media (max-width: 560px) {
      .region-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .all-card { flex-direction: column; align-items: flex-start; }
      .header { margin-bottom: 28px; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="header">
    <div class="logo-mark">📍</div>
    <h1>Field Ops <span>Dashboard</span></h1>
    <p>Select a region to load its data and maps</p>
  </div>

  <div class="region-grid" id="regionGrid">
    <!-- Populated by JS -->
  </div>

  <div class="footer-note">
    Data is filtered per region. Switch regions by returning to this page.
  </div>

</div>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Loading region data…</div>
</div>

<script>
// ── Hardcoded regions ─────────────────────────────────────────────────────
const REGIONS = [
  "bangalore",
  "hyderabad",
  "noida",
  "mumbai",
  "delhi",
  "gurugram",
  "navi mumbai",
  "ghaziabad",
  "pune",
  "thane",
];

// ── Visual config per region ───────────────────────────────────────────────
const REGION_META = {
  "bangalore":  { icon: "🌆", accent: "#3b82f6",  desc: "Silicon Valley of India" },
  "hyderabad":  { icon: "🕌", accent: "#8b5cf6",  desc: "City of Pearls" },
  "noida":      { icon: "🏙️", accent: "#10b981",  desc: "NCR East — Greater Noida & Expressway" },
  "mumbai":     { icon: "🌊", accent: "#ef4444",  desc: "Maximum City — Western & Central suburbs" },
  "delhi":      { icon: "🏛️", accent: "#f59e0b",  desc: "National Capital Region" },
  "gurugram":   { icon: "🏢", accent: "#06b6d4",  desc: "Millennium City — Cyber Hub belt" },
  "navi mumbai":{ icon: "🌉", accent: "#f97316",  desc: "Planned township across the harbour" },
  "ghaziabad":  { icon: "🏗️", accent: "#84cc16",  desc: "NCR West — Raj Nagar & Vaishali" },
  "pune":       { icon: "🎓", accent: "#a78bfa",  desc: "Oxford of the East — Hinjewadi & Kharadi" },
  "thane":      { icon: "🌿", accent: "#34d399",  desc: "City of Lakes — Eastern suburbs" },
};

// ── Render ────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById("regionGrid");
  grid.innerHTML = "";

  REGIONS.forEach(region => {
    const meta = REGION_META[region] || { icon: "📍", accent: "#f0c040", desc: "Regional operations zone" };
    const card = document.createElement("div");
    card.className = "region-card";
    card.style.setProperty("--card-accent", meta.accent);
    card.tabIndex = 0;
    card.setAttribute("role", "button");
    card.setAttribute("aria-label", "Select " + region);
    card.innerHTML = `
      <div class="card-icon">${meta.icon}</div>
      <div class="card-name">${escHtml(capitalise(region))}</div>
      <div class="card-meta">${escHtml(meta.desc)}</div>
      <div class="card-badge">▶ Open Dashboard</div>`;
    card.addEventListener("click", () => selectRegion(region));
    card.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") selectRegion(region); });
    grid.appendChild(card);
  });

  // All regions card
  const allCard = document.createElement("div");
  allCard.className = "region-card all-card";
  allCard.tabIndex = 0;
  allCard.setAttribute("role", "button");
  allCard.innerHTML = `
    <div class="card-icon">🌐</div>
    <div class="card-info">
      <div class="card-name">All Regions</div>
      <div class="card-meta">Load data from every region — may be slower</div>
    </div>
    <div class="card-badge">▶ Open All</div>`;
  allCard.addEventListener("click", () => selectRegion("all"));
  allCard.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") selectRegion("all"); });
  grid.appendChild(allCard);
}

// ── Select & navigate ─────────────────────────────────────────────────────
function selectRegion(region) {
  try { sessionStorage.setItem("selectedRegion", region); } catch (e) {}
  const overlay = document.getElementById("loadingOverlay");
  const text    = document.getElementById("loadingText");
  text.textContent = "Loading " + (region === "all" ? "All Regions" : capitalise(region)) + " data…";
  overlay.classList.add("active");
  setTimeout(() => { window.location.href = "dashboard.html"; }, 200);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function capitalise(s) {
  return s.split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
}
function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Boot ──────────────────────────────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
